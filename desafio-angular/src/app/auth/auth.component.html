<div class="auth-root">
  <div class="auth-card" role="main" aria-label="Login">
    <header class="auth-header">
      <div class="logo" aria-hidden="true">C</div>
      <div class="titles">
        <h2 class="welcome-title">Hola, bienvenido</h2>
        <p class="subtitle">Inicia sesión y haz que suceda</p>
      </div>
    </header>

    <form class="auth-form" (ngSubmit)="onSubmit()" novalidate>
      <label class="field">
        <span class="label-text">Usuario</span>
        <div class="input-wrap">
          <span class="left-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5z" fill="#666"/><path d="M4 20c0-3.314 2.686-6 6-6h4c3.314 0 6 2.686 6 6v1H4v-1z" fill="#666"/></svg>
          </span>
          <input name="usuario" [(ngModel)]="usuario" required placeholder="Tu usuario" />
        </div>
      </label>

      <label class="field">
        <span class="label-text">Contraseña</span>
        <div class="input-wrap">
          <span class="left-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17 8V7a5 5 0 0 0-10 0v1H5v11h14V8h-2zM9 7a3 3 0 0 1 6 0v1H9V7z" fill="#666"/></svg>
          </span>
          <input name="password" [(ngModel)]="password" [type]="mostrarPassword ? 'text' : 'password'" required placeholder="Tu contraseña" />
          <button type="button" class="eye" (click)="togglePassword()" [attr.aria-pressed]="mostrarPassword" aria-label="Mostrar contraseña">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5c-7 0-11 6-11 7s4 7 11 7 11-6 11-7-4-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z" fill="#666"/></svg>
          </button>
        </div>
      </label>

      <button class="btn primary" type="submit">Ingresar</button>
      <button class="btn text" type="button">Cerrar</button>
    </form>

    <footer class="auth-footer">Versión 2026.01.15.0002 act. el 15/01/2026</footer>
  </div>
</div>
